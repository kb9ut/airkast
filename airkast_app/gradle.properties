# Gradle User Home (if not set, defaults to ~/.gradle)
# GRADLE_USER_HOME=

# The Gradle Daemon (enabled by default)
# org.gradle.daemon=true

# Java home for the Gradle Daemon (if different from the one running the client)

# Configure the amount of memory available to the Gradle Daemon
org.gradle.jvmargs=-Xmx4096m

# When configured, Gradle will run in incubating continuous build mode.
# org.gradle.continuous=false

# When configured, Gradle will use a watching file system to listen for changes to project files.
# org.gradle.vfs.watch=true

android.useAndroidX=true
android.enableJetifier=true

